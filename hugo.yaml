baseURL: https://log.console.so/
title: Console Labs
copyright: © 2026 Console Labs.
# log.console.so already says "log", so the /blog/ path prefix was redundant
# (the legacy post blog/log.md rendered at the doubled /blog/log/). Posts now
# resolve at a root slug from the FILENAME (:contentbasename), so the dated
# monthly file console-log-YYYY-MM.md -> /console-log-YYYY-MM/. :slug would
# derive from the title ("Console Log: June 2026" -> /console-log-june-2026/),
# which is undated and unstable; basename keeps URLs dated + sortable. A post
# can still override with front-matter `slug:`. Section archive list stays /blog/.
permalinks:
  blog: /:contentbasename/
languages:
  en:
    languageCode: en-us
    weight: 1
params:
  # Site-wide default for <meta name="description">, OG/Twitter description, and the
  # JSON-LD; used whenever a page has no own .Description (e.g. posts with an empty
  # front-matter description). Was unset, leaving those tags empty.
  description: "The Console Labs lab journal: monthly notes on what we build, ship, and learn. Safe, accessible tooling, narrated honestly."
  Copyright: "© 2026 Console Labs."
  author:
    email: han@console.so
    name: Han Ngo
module:
  imports:
  - path: github.com/alex-shpak/hugo-book
    disable: true
  - path: github.com/adityatelange/hugo-PaperMod
    disable: true

outputs:
  home:
  - html
  - rss
  - json
  section:
  - html
  - rss
  - json
  taxonomy:
  - html
  - rss
  - json
  term:
  - html
  - rss
  - json
markup:
  highlight:
    anchorLineNos: false
    codeFences: false
    guessSyntax: false
    hl_Lines: 1
    lineAnchors: ""
    lineNoStart: 1
    lineNos: false
    lineNumbersInTable: false
    noClasses: true
    tabWidth: 1
  frontmatter:
    publishDate: ["publishDate", "date"]
    authors: ["authors"]
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    endLevel: 2
    ordered: false
    startLevel: 2
