baseURL: https://log.console.so/
title: Console Labs
copyright: © 2023 ConsoleLabs.
# log.console.so already says "log", so the /blog/ path prefix was redundant
# (the legacy post blog/log.md rendered at the doubled /blog/log/). Posts now
# resolve at a root slug (/<slug>/); the section archive list stays at /blog/.
permalinks:
  blog: /:slug/
languages:
  en:
    languageCode: en-us
    weight: 1
params:
  author:
    email: han@console.so
    name: Han Ngo
module:
  imports:
  - path: github.com/alex-shpak/hugo-book
    disable: true
  - path: github.com/adityatelange/hugo-PaperMod
    disable: true

outputs:
  home:
  - html
  - rss
  - json
  section:
  - html
  - rss
  - json
  taxonomy:
  - html
  - rss
  - json
  term:
  - html
  - rss
  - json
markup:
  highlight:
    anchorLineNos: false
    codeFences: false
    guessSyntax: false
    hl_Lines: 1
    lineAnchors: ""
    lineNoStart: 1
    lineNos: false
    lineNumbersInTable: false
    noClasses: true
    tabWidth: 1
  frontmatter:
    publishDate: ["publishDate", "date"]
    authors: ["authors"]
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    endLevel: 2
    ordered: false
    startLevel: 2
